name: Build og push Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:   # Tillad manuel kørsel fra GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # f.eks. jonas/vagtkalender

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Kræves for at skrive til ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log ind på GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # Automatisk tilgængeligt — intet at konfigurere

      - name: Udtræk metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Byg og push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha     # GitHub Actions cache — hurtigere genbygning
          cache-to: type=gha,mode=max
